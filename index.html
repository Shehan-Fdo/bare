<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    border: 0;
    outline: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #ffffff;
  }

  #editor {
    display: block;
    width: 100vw;
    height: 100vh;
    padding: 8px;
    margin: 0;
    border: none;
    outline: none;
    background: transparent;
    color: #000000;
    font-family: monospace;
    font-size: 16px;
    line-height: 1.4;
    caret-color: #000000;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #editor:empty::before {
    content: "";
  }
</style>
</head>
<body>
  <div id="editor" contenteditable="true" spellcheck="false"></div>
  <script>
    const editor = document.getElementById('editor');
    const STORAGE_KEY = 'bare:content';

    let saved = '';

    try {
      saved = localStorage.getItem(STORAGE_KEY) || '';
    } catch (e) {
      saved = '';
    }

    if (saved) {
      editor.innerHTML = saved;
    }

    const save = () => {
      try {
        localStorage.setItem(STORAGE_KEY, editor.innerHTML);
      } catch (e) {
        // localStorage unavailable, just keep typing in memory
      }
    };

    editor.addEventListener('input', save);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '  ');
      }
    });

    editor.focus();

    // Nudge the cursor to the end if we restored content
    if (saved) {
      const range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // Browser warning if there's content and user tries to leave
    window.addEventListener('beforeunload', (e) => {
      const hasContent = editor.textContent.trim().length > 0;
      if (hasContent) {
        e.preventDefault();
        e.returnValue = '';
        return '';
      }
    });
  </script>
</body>
